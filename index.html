<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배당금 트래커 - Dividend Tracker</title>
  
  <!-- Fonts: Outfit for a modern look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase Compat Libraries -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- App Container -->
  <div class="app-container">
    
    <!-- Header -->
    <header class="header">
      <div class="logo-area">
        <i class="fa-solid fa-coins logo-icon"></i>
        <h1>Divi<span class="highlight">Tracker</span></h1>
      </div>
      <button id="settings-btn" class="icon-btn" title="포트폴리오 설정">
        <i class="fa-solid fa-gear"></i>
      </button>
    </header>

    <!-- Main Dashboard -->
    <main class="dashboard">
      <!-- Total Summary Card -->
      <section class="summary-card glass">
        <h2><span id="current-year">2026</span>년 총 배당금</h2>
        <div class="total-amount">
          <span id="total-dividend">0</span>
          <span class="currency">원</span>
        </div>
      </section>

      <!-- Chart Section -->
      <section class="chart-section glass">
        <canvas id="dividendChart"></canvas>
      </section>

      <!-- Monthly Data List -->
      <section class="monthly-list">
        <h3>월별 상세 내역</h3>
        <div class="month-tabs" id="month-tabs">
          <!-- Month buttons will be generated by app.js -->
        </div>
        <div id="month-detail-container" class="month-detail-container glass">
          <!-- Selected month details will be generated here -->
        </div>
      </section>
    </main>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal">
    <div class="modal-content glass">
      <div class="modal-header">
        <h2>포트폴리오 관리</h2>
        <button id="close-modal-btn" class="icon-btn close-btn">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <p class="modal-desc">관리할 주식 종목을 추가하거나 삭제하세요.</p>
        
        <form id="add-stock-form" class="add-stock-form">
          <input type="text" id="new-stock-input" placeholder="새 종목 이름 (예: AAPL, 삼성전자)" required>
          <button type="submit" class="btn primary-btn"><i class="fa-solid fa-plus"></i> 추가</button>
        </form>

        <ul id="stock-list" class="stock-list">
          <!-- Stock items will go here -->
        </ul>
      </div>
    </div>
  </div>

  <!-- App Script -->
  <script src="app.js"></script>
</body>
</html>
